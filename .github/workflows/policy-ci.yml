name: policy-ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  policy-lint:
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"
      - name: Run policy lint
        run: python tools/policy_lint.py
      - name: Run policy lint (strict)
        run: python tools/policy_lint.py --strict
      - name: Run policy lint (strict, modules)
        run: python tools/policy_lint.py --strict --modules
      - name: policy_lint self-test (expects failure)
        run: python tools/policy_lint_selftest.py
